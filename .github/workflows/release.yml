name: Release desktop app

# Builds the self-contained desktop app for Windows, Linux and macOS and attaches the archives to a
# GitHub Release. Runs on a version tag (e.g. `v0.1.0`) or manual dispatch.
#
# Each build runs on its NATIVE runner (windows/ubuntu/macos), so a green run also proves the app
# compiles, publishes and actually serves on that OS. The download page and the in-app update check
# link to `releases/latest/download/AssetStore-<rid>.<ext>`, so the asset names below must stay stable.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64, smoke: true }
          - { os: ubuntu-latest, rid: linux-x64, smoke: true }
          - { os: macos-latest, rid: osx-arm64, smoke: true }
          - { os: macos-latest, rid: osx-x64, smoke: false } # cross-arch on the arm64 runner: build only
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained)
        shell: bash
        run: |
          dotnet publish src/AssetStore.Desktop/AssetStore.Desktop.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o "publish/${{ matrix.rid }}"

      - name: Smoke test (app starts and serves)
        if: matrix.smoke
        shell: bash
        run: |
          DIR="publish/${{ matrix.rid }}"
          BIN="$DIR/AssetStore.Desktop"
          [ "${{ runner.os }}" = "Windows" ] && BIN="$DIR/AssetStore.Desktop.exe"
          chmod +x "$BIN" 2>/dev/null || true
          "$BIN" &
          PID=$!
          OK=0
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:5111/ >/dev/null 2>&1; then OK=1; break; fi
            sleep 2
          done
          kill "$PID" 2>/dev/null || true
          if [ "$OK" != "1" ]; then echo "::error::app did not serve on ${{ matrix.rid }}"; exit 1; fi
          echo "served OK on ${{ matrix.rid }}"

      - name: Package (Windows → .zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "AssetStore-${{ matrix.rid }}.zip"

      - name: Package (Unix → .tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "AssetStore-${{ matrix.rid }}.tar.gz" -C "publish/${{ matrix.rid }}" .

      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # Create the release if it doesn't exist yet (tolerate the matrix race).
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes || true
          gh release upload "$TAG" AssetStore-${{ matrix.rid }}.* --clobber
